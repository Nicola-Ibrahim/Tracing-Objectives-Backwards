services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      # Defaults to the last stage 'runner'
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
    # No volume mounts or dev command overrides

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      # Defaults to the last stage 'runner'
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    depends_on:
      - backend
    # No volume mounts or dev command overrides

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
