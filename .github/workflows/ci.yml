name: 1. CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches-ignore: [ main ]

jobs:
  # ── Detect which parts of the monorepo actually changed ──────────────────
  # All other jobs key off these outputs so nothing runs unnecessarily.
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/1-ci.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/1-ci.yml'

  # ── Backend: lint + unit tests ───────────────────────────────────────────
  # Runs on every push to any branch. No Docker involved — fast feedback.
  backend-test:
    needs: [ changes ]
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv python install 3.12
      - run: uv sync --frozen
      - run: uv run poe lint
      - run: uv run poe test

  # ── Frontend: lint + unit tests ──────────────────────────────────────────
  # Runs on every push to any branch. No Docker involved — fast feedback.
  frontend-test:
    needs: [ changes ]
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test --if-present

  # ── Backend: production image smoke test (PR to main only) ───────────────
  # Builds the runner stage (not dev) — tests the exact image that ships.
  # No Redis, no Nginx, no compose. Just: does the production image start
  # and respond to a health check?
  backend-smoke:
    needs: [ backend-test ]
    if: |
      github.event_name == 'pull_request' &&
      needs.backend-test.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Production Image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          target: runner            # test the real production image, not dev
          push: false               # CD handles the push after merge
          load: true                # load into local daemon so we can run it
          tags: backend-ci:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate Environment File
        # Full .env stored as a single secret — add/change vars in GitHub
        # Settings without ever touching this workflow.
        run: echo "${{ secrets.ENV_FILE_TESTING }}" > ./backend/.env

      - name: Run & Verify Health
        run: |
          docker run -d \
            --name backend-ci \
            -p 8000:8000 \
            --env-file ./backend/.env \
            backend-ci:latest

          for i in {1..10}; do
            if curl -sf http://localhost:8000/health; then
              echo "✅ Health check passed"
              exit 0
            fi
            echo "Waiting... ($i/10)"
            sleep 3
          done
          echo "❌ Health check timed out"
          exit 1

      - name: Show logs on failure
        if: failure()
        run: docker logs backend-ci

      - name: Cleanup
        if: always()
        run: docker rm -f backend-ci 2>/dev/null || true

  # ── Frontend: production image smoke test (PR to main only) ──────────────
  # Same principle — build the runner stage, run it, hit the health endpoint.
  frontend-smoke:
    needs: [ frontend-test ]
    if: |
      github.event_name == 'pull_request' &&
      needs.frontend-test.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Production Image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          target: runner
          push: false
          load: true
          tags: frontend-ci:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}

      - name: Run & Verify Health
        run: |
          docker run -d \
            --name frontend-ci \
            -p 3000:3000 \
            frontend-ci:latest

          for i in {1..10}; do
            if curl -sf http://localhost:3000/api/health; then
              echo "✅ Health check passed"
              exit 0
            fi
            echo "Waiting... ($i/10)"
            sleep 3
          done
          echo "❌ Health check timed out"
          exit 1

      - name: Show logs on failure
        if: failure()
        run: docker logs frontend-ci

      - name: Cleanup
        if: always()
        run: docker rm -f frontend-ci 2>/dev/null || true