name: 3. CD (Frontend)

on:
  push:
    branches: [ main ]
    paths:
      - 'frontend/**'
      - '.github/workflows/3-cd-frontend.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE: ${{ github.repository }}-frontend

jobs:
  # ── Build the runner image and push to GHCR ──────────────────────────────
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=main-{{date 'YYYYMMDD'}}-{{sha}}

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          target: runner
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}

  # ── Tell Render to pull the new :latest and redeploy ─────────────────────
  # Store hook URL from Render dashboard in GitHub Secrets as RENDER_FRONTEND_DEPLOY_HOOK.
  deploy:
    needs: [ build-and-push ]
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Frontend Deploy
        run: |
          curl -fsSL "${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK }}" \
            -o response.json
          cat response.json
          echo "✅ Render frontend deploy triggered — image: ${{ needs.build-and-push.outputs.image-tag }}"