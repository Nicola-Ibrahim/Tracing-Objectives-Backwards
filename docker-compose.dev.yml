services:
  backend:
    container_name: backend
    hostname: backend
    image: ${BACKEND_IMAGE:-my-local-backend:latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    volumes:
      - ./backend:/app:cached
    env_file:
      - ./backend/.env
    command: uv run fastapi dev src/api/main.py --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]

      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - backend-net

  nginx:
    container_name: nginx
    image: nginx:alpine
    volumes:
      - ./infra/nginx/default.dev.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - backend-net

networks:
  backend-net:
    driver: bridge
