services:
  backend:
    container_name: backend
    hostname: backend
    image: ${BACKEND_IMAGE:-my-local-backend:latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    volumes:
      - ./backend:/app:cached
    env_file:
      - ./backend/.env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      redis:
        condition: service_healthy
    networks: 
      - backend-net

  nginx:
    container_name: nginx
    image: nginx:alpine
    volumes:
      - ./infra/nginx/default.dev.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - backend-net

  redis:
    image: redis:alpine
    container_name: redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - backend-net


networks:
  backend-net:
    driver: bridge
