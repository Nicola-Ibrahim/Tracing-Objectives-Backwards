server {
    listen 80;
    server_name localhost;

    # Optimized for API Gateway Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Docker internal DNS resolver
    resolver 127.0.0.11 valid=30s;

    # Root redirect or status (Optional: prevents 404 on /)
    location / {
        return 200 'API Gateway Operational\n';
        add_header Content-Type text/plain;
    }

    # Backend API Gateway (Transparent Proxy)
    location /api/ {
        set $upstream_backend backend:8000;
        proxy_pass http://$upstream_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    
        # Timeouts (Increased to 300s for heavy compute)
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        send_timeout 300s;

        # Performance: Disable buffering for fast API response
        proxy_buffering off;
        proxy_request_buffering off;

        # Buffer definitions (Production standard)
        proxy_buffers 16 16k;
        proxy_buffer_size 32k;
    }

    # Redirect /api to /api/ for consistency
    location = /api {
        return 301 /api/;
    }

    # Gzip settings
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
