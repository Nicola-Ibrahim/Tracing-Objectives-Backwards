# HTTP - Redirect all traffic to HTTPS
server {
    listen 80;
    server_name yourdomain.com; # Replace with your production domain

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS - Main API Gateway Block
server {
    listen 443 ssl;
    server_name yourdomain.com; # Replace with your production domain

    # SSL Configuration (Replace placeholders with actual paths)
    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # Recommended SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubdomains; preload";

    # Root status (Optional)
    location / {
        return 200 'API Gateway Operational\n';
        add_header Content-Type text/plain;
    }

    # Docker internal DNS resolver
    resolver 127.0.0.11 valid=30s;

    # Backend API Gateway (Transparent Proxy)
    location /api/ {
        set $upstream_backend backend:8000;
        proxy_pass http://$upstream_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts and Buffering (Increased to 300s for heavy compute)
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        send_timeout 300s;
        proxy_buffering on;
        proxy_buffers 16 16k;
        proxy_buffer_size 32k;
    }

    # Redirect /api to /api/ for consistency
    location = /api {
        return 301 /api/;
    }

    # Gzip settings
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
